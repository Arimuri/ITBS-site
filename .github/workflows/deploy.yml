name: Deploy to Sakura

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx astro build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H arimuri.sakura.ne.jp >> ~/.ssh/known_hosts

      - name: Deploy main site
        run: rsync -avz --delete --exclude='/c4p/' ./dist/ arimuri@arimuri.sakura.ne.jp:/home/arimuri/www/

      - name: Deploy c4p subdomain
        run: rsync -avz ./c4p-site/ arimuri@arimuri.sakura.ne.jp:/home/arimuri/www/c4p/
